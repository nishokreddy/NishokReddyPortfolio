<head>

    <title>Nishok Reddy Portfolio</title>
    <style>
        .cert-icon {
            width: 40px;
            height: 40px;
            margin: 0 10px;
            transition: transform 0.3s;

        .cert-icon:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div class="certifications">
        <h2>Certifications</h2>
        <div>
            <img src="assets/logos/comptia-security-plus.png" alt="CompTIA Security+" class="cert-icon">
            <img src="assets/logos/sentinelone.png" alt="SentinelOne" class="cert-icon">
            <img src="assets/logos/splunk.png" alt="Splunk" class="cert-icon">
            <img src="assets/logos/proofpoint.png" alt="Proofpoint" class="cert-icon">
        </div>
    </div>
</body>
</html>
