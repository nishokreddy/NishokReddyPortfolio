<!DOCTYPE html>
<html lang="en">
<head>

<!-- ================= SEO + META (NEW) ================= -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Venkat Sai Nishok Reddy | SOC Analyst</title>

<meta name="description" content="SOC Analyst Portfolio | SIEM, EDR, Threat Detection, Incident Response">

<!-- Open Graph -->
<meta property="og:title" content="Venkat Sai Nishok Reddy Portfolio">
<meta property="og:description" content="Cybersecurity | SOC | SIEM | EDR">
<meta property="og:type" content="website">

<link rel="icon" href="assets/favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Space+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">

<style>

/* ================= NEW: LOADER ================= */
#loader {
  position: fixed;
  inset: 0;
  background: #060b10;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  font-family: monospace;
  color: #00e5a0;
}

/* ================= NEW: SCROLL PROGRESS ================= */
#progressBar {
  position: fixed;
  top: 0;
  left: 0;
  height: 3px;
  background: #00e5a0;
  width: 0%;
  z-index: 999;
}

/* ================= NEW: BACK TO TOP ================= */
#backToTop {
  position: fixed;
  bottom: 30px;
  right: 30px;
  background: #00e5a0;
  color: black;
  padding: 10px 14px;
  border-radius: 50%;
  cursor: pointer;
  display: none;
}

/* ================= HERO ENHANCEMENTS ================= */
.typing {
  color: #00e5a0;
  font-family: monospace;
}

.rotate {
  color: #00c8ff;
  font-family: monospace;
}

/* ================= PROJECT OVERLAY ================= */
.project-card {
  position: relative;
}

.project-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.85);
  opacity: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.3s;
}

.project-card:hover .project-overlay {
  opacity: 1;
}

/* ================= FEATURED BADGE ================= */
.featured {
  position: absolute;
  top: 10px;
  right: 10px;
  background: gold;
  color: black;
  padding: 3px 8px;
  font-size: 10px;
}

/* ================= MODAL SCROLL ================= */
.modal-progress {
  position: sticky;
  top: 0;
  height: 3px;
  background: #00c8ff;
  width: 0%;
}

/* ================= FORM ERROR ================= */
.error {
  color: red;
  font-size: 12px;
}

.success {
  color: #00e5a0;
  font-size: 12px;
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">Loading...</div>

<!-- SCROLL PROGRESS -->
<div id="progressBar"></div>

<!-- BACK TO TOP -->
<div id="backToTop">↑</div>

<!-- ================= HERO ================= -->
<section id="hero">

<h1>Venkat Sai Nishok Reddy</h1>

<p class="typing" id="typing"></p>
<p class="rotate" id="rotate"></p>

<button onclick="downloadResume()">Download Resume</button>

</section>

<!-- ================= PROJECT (UPDATED) ================= -->
<div class="project-card">

<div class="featured">Featured</div>

<h3>SIEM Lab</h3>

<div class="project-overlay">
  <span>View Details</span>
</div>

</div>

<!-- ================= CONTACT ================= -->
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<textarea id="msg"></textarea>

<button onclick="sendMail()">Send</button>

<p id="formMsg"></p>

<script>

/* ================= LOADER ================= */
window.onload = () => {
  document.getElementById("loader").style.display = "none";
};

/* ================= SCROLL PROGRESS ================= */
window.onscroll = () => {
  let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
  let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  document.getElementById("progressBar").style.width = (winScroll / height) * 100 + "%";

  document.getElementById("backToTop").style.display = winScroll > 200 ? "block" : "none";
};

/* ================= BACK TO TOP ================= */
document.getElementById("backToTop").onclick = () => window.scrollTo({top:0, behavior:"smooth"});

/* ================= TYPING EFFECT ================= */
const text = "whoami → Associate Security Analyst | SOC Operations";
let i = 0;
function typingEffect() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typingEffect, 40);
  }
}
typingEffect();

/* ================= ROTATING SKILLS ================= */
const skills = ["SIEM", "EDR", "Threat Hunting", "Incident Response"];
let j = 0;
setInterval(() => {
  document.getElementById("rotate").innerText = skills[j];
  j = (j + 1) % skills.length;
}, 1500);

/* ================= DOWNLOAD RESUME ================= */
function downloadResume() {
  window.open("assets/resume.pdf");
}

/* ================= CONTACT FIX ================= */
function sendMail() {

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const msg = document.getElementById("msg").value.trim();
  const output = document.getElementById("formMsg");

  if (!name || !email || !msg) {
    output.innerHTML = "All fields required";
    output.className = "error";
    return;
  }

  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRegex.test(email)) {
    output.innerHTML = "Invalid email";
    output.className = "error";
    return;
  }

  const mailto = `mailto:nishokreddy23@gmail.com?subject=Portfolio Contact&body=${encodeURIComponent(
    `Hi Nishok,\n\n${msg}\n\nFrom: ${name}\nEmail: ${email}`
  )}`;

  window.location.href = mailto;

  output.innerHTML = "Opening mail client...";
  output.className = "success";
}

</script>

</body>
</html>
